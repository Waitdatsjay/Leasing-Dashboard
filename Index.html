function cap(apps,f){
    const st={},ws=gws(),ms=gms(),lms=glms(),lme=glme();

        let inc=false;
        if(f==='wtd'&&(a.applicationDate>=ws||(a.originalLeaseExecuted&&a.originalLeaseExecuted>=ws)))inc=true;
        if(f==='mtd'&&(a.applicationDate>=ms||(a.originalLeaseExecuted&&a.originalLeaseExecuted>=ms)))inc=true;
        if(f==='lastmonth'&&(a.applicationDate>=lms&&a.applicationDate<=lme)||(a.originalLeaseExecuted&&a.originalLeaseExecuted>=lms&&a.originalLeaseExecuted<=lme))inc=true;
        if(f==='lastweek'&&(a.applicationDate>=glws()&&a.applicationDate<=glwe())||(a.originalLeaseExecuted&&a.originalLeaseExecuted>=glws()&&a.originalLeaseExecuted<=glwe()))inc=true;
        if(f==='historical')inc=true;
        if(inc){
            let cApp=false;
            if(f==='wtd'&&a.applicationDate>=ws)cApp=true;
            if(f==='mtd'&&a.applicationDate>=ms)cApp=true;
            if(f==='lastmonth'&&a.applicationDate>=lms&&a.applicationDate<=lme)cApp=true;
            if(f==='lastweek'&&a.applicationDate>=glws()&&a.applicationDate<=glwe())cApp=true;
            if(f==='historical')cApp=true;
            if(cApp){
                st[ag].totalApplications++;
                st[ag].propertiesWorked.add(a.property);
                const s=(a.status||'').toLowerCase();
                if(s.includes('cancel')||s.includes('denied'))st[ag].cancelsDenials++;
            }
            if(a.originalLeaseExecuted){
                let il=false;

                if(f==='mtd'&&a.originalLeaseExecuted>=ms)il=true;
                if(f==='lastmonth'&&a.originalLeaseExecuted>=lms&&a.originalLeaseExecuted<=lme)il=true;
                if(f==='lastweek'&&a.originalLeaseExecuted>=glws()&&a.originalLeaseExecuted<=glwe())il=true;
                if(f==='historical')il=true;
                if(il){st[ag].leasesSigned++;st[ag].propertiesWorked.add(a.property);}
            }
        }
        const s=(a.status||'').toLowerCase();

        }
    });
    return st;
}

    const ast={};

    return{leaseSigned:ls,goal:g,remaining:rem,progressPercent:pp,dailyPaceNeeded:dpn,daysRemaining:dr,activePipeline:pipe.length,violations24hr:v24,violations48hr:v48,agentStats:ast,stageBreakdown:sb};
}

3 gap-4"><div class="bg-blue-50 p-4 rounded"><div class="text-sm text-blue-600 font-semibold">Total Apps</div><div class="text-3xl font-bold text-blue-700">${srt.reduce((s,[_,st])=>s+st.totalApplications,0)}</div></div><div class="bg-green-50 p-4 rounded"><div class="text-sm text-green-600 font-semibold">Total Leases</div><div class="text-3xl font-bold text-green-700">${srt.reduce((s,[_,st])=>s+st.leasesSigned,0)}</div></div><div class="bg-purple-50 p-4 rounded"><div class="text-sm text-purple-600 font-semibold">Close Rate</div><div class="text-3xl font-bold text-purple-700">${(()=>{const ta=srt.reduce((s,[_,st])=>s+st.totalApplications,0),tl=srt.reduce((s,[_,st])=>s+st.leasesSigned,0);return ta>0?((tl/ta)*100).toFixed(1):'0.0';})()}%</div></div></div></div>`;

        if(ag.includes('marketing')||ag==='flow')return false;

        if(st.includes('cancel')||st.includes('denied'))return false;
        if(a.approvalDate&&!a.originalLeaseExecuted){

function agentEfficiency(){
    const all=[...data.brickell,...data.west,...data.east,...data.ftl];
    const ms=gms();
    const mtdStats=cap(all,effView);
    const remoteAdminAgents=['Zackery Faszczewski','Estephania Delgadillo','Estephanie Cardenas'];
    const lms=glms(),lme=glme();
    const period=effView==='mtd'?{start:ms,end:null}:{start:lms,end:lme};
    const agentMetrics=Object.entries(mtdStats).filter(([agent])=>!remoteAdminAgents.includes(agent)).map(([agent,stats])=>{
        const agentApps=all.filter(a=>{const ag=nag(a.agent);if(ag!==agent)return false;if(!period.end)return a.applicationDate>=period.start;return a.applicationDate>=period.start&&a.applicationDate<=period.end;});
        const vel=calcVelocity(agentApps);
        const efficiency=stats.pendingApplications>0?(stats.leasesSigned/stats.pendingApplications*10).toFixed(1):0;
        const closeRate=stats.totalApplications>0?((stats.leasesSigned/stats.totalApplications)*100).toFixed(0):0;
        const speed=parseFloat(vel.avgAppToApproval)+parseFloat(vel.avgApprovalToLease);
        const highVolume=stats.leasesSigned>=8;
        const highEfficiency=parseFloat(closeRate)>=40;
        let quadrant,color;
        if(highVolume&&highEfficiency){quadrant='Star';color='#10B981';}
        else if(highVolume&&!highEfficiency){quadrant='Grinder';color='#F59E0B';}
        else if(!highVolume&&highEfficiency){quadrant='Closer';color='#3B82F6';}
        else{quadrant='Developing';color='#EF4444';}
        return{agent,leases:stats.leasesSigned,closeRate,efficiency,speed:speed.toFixed(1),quadrant,color,pending:stats.pendingApplications};
    }).sort((a,b)=>b.leases-a.leases);
    const title=effView==='mtd'?'MTD (Feb 2026)':'Last Month (Jan 2026)';
    return`<div class="bg-white rounded-lg shadow-xl p-6 mb-6"><h2 class="text-2xl font-bold text-gray-800 mb-4">⚡ Agent Efficiency Matrix</h2><div class="flex gap-2 mb-4">${['mtd','lastmonth'].map(v=>`<button onclick="chEff('${v}')"class="px-4 py-2 rounded font-semibold ${effView===v?'bg-blue-500 text-white':'bg-gray-200 text-gray-700'}">${v==='mtd'?'This Month':'Last Month'}</button>`).join('')}</div><div class="mb-2 text-sm text-gray-600">${title}</div><div class="mb-4 grid grid-cols-4 gap-4">${[{q:'Star',d:'High Volume + High Efficiency',c:'#10B981'},{q:'Grinder',d:'High Volume, Lower Efficiency',c:'#F59E0B'},{q:'Closer',d:'Lower Volume, High Efficiency',c:'#3B82F6'},{q:'Developing',d:'Needs Support',c:'#EF4444'}].map(t=>{const agents=agentMetrics.filter(a=>a.quadrant===t.q);return`<div class="p-3 rounded border-2"style="border-color:${t.c}"><div class="font-semibold mb-1"style="color:${t.c}">${t.q}</div><div class="text-xs text-gray-600 mb-2">${t.d}</div><div class="text-2xl font-bold"style="color:${t.c}">${agents.length}</div><div class="text-xs text-gray-500">${agents.map(a=>a.agent.split(' ')[0]).join(', ')||'None'}</div></div>`;}).join('')}</div><table class="w-full text-sm"><thead class="bg-gray-100"><tr><th class="px-3 py-2 text-left">Agent</th><th class="px-3 py-2 text-center">Leases</th><th class="px-3 py-2 text-center">Close%</th><th class="px-3 py-2 text-center">Efficiency</th><th class="px-3 py-2 text-center">Avg Speed</th><th class="px-3 py-2 text-center">Category</th></tr></thead><tbody>${agentMetrics.map((a,i)=>`<tr class="${i%2===0?'bg-white':'bg-gray-50'}"><td class="px-3 py-2 font-medium">${a.agent}</td><td class="px-3 py-2 text-center font-bold text-green-600">${a.leases}</td><td class="px-3 py-2 text-center"><span class="px-2 py-1 rounded text-xs font-semibold ${parseFloat(a.closeRate)>=50?'bg-green-100 text-green-800':parseFloat(a.closeRate)>=30?'bg-yellow-100 text-yellow-800':'bg-red-100 text-red-800'}">${a.closeRate}%</span></td><td class="px-3 py-2 text-center text-purple-600 font-semibold">${a.efficiency}</td><td class="px-3 py-2 text-center ${parseFloat(a.speed)<=3?'text-green-600':parseFloat(a.speed)<=5?'text-orange-600':'text-red-600'}font-semibold">${a.speed}d</td><td class="px-3 py-2 text-center"><span class="px-2 py-1 rounded text-xs font-bold text-white"style="background-color:${a.color}">${a.quadrant}</span></td></tr>`).join('')}</tbody></table><div class="mt-4 grid grid-cols-3 gap-4 text-xs"><div class="bg-purple-50 p-3 rounded"><strong>Efficiency:</strong> Leases per 10 active deals</div><div class="bg-blue-50 p-3 rounded"><strong>Avg Speed:</strong> App→Approval + Approval→Lease time</div><div class="bg-green-50 p-3 rounded"><strong>Close Rate:</strong> Leases ÷ Applications</div></div></div>`;
}

function pipelineHealth(){

function unitTypeIntel(){

    const analyzeProperty=(propData,propName)=>{
        const unitStats={};
        propData.forEach(a=>{
            const ag=(a.agent||'').toLowerCase().trim();
            if(ag.includes('marketing')||ag==='flow')return;
            let include=false;
            if(unitView==='mtd'&&a.applicationDate>=ms)include=true;
            if(unitView==='lastmonth'&&a.applicationDate>=lms&&a.applicationDate<=lme)include=true;
            if(unitView==='historical')include=true;
            if(!include)return;
            const ut=parseUnit(a.unitType||a.unit,propName);
            if(!unitStats[ut])unitStats[ut]={apps:0,approved:0,leased:0,cancelled:0};
            unitStats[ut].apps++;
            if(a.approvalDate)unitStats[ut].approved++;
            if(a.originalLeaseExecuted)unitStats[ut].leased++;
            const st=(a.status||'').toLowerCase();
            if(st.includes('cancel')||st.includes('denied'))unitStats[ut].cancelled++;
        });
        return Object.entries(unitStats).filter(([type])=>type!=='Unknown').map(([type,stats])=>({type,apps:stats.apps,conversionRate:stats.apps>0?(stats.leased/stats.apps*100).toFixed(1):0,approvalRate:stats.apps>0?(stats.approved/stats.apps*100).toFixed(1):0,cancelRate:stats.apps>0?(stats.cancelled/stats.apps*100).toFixed(1):0,leased:stats.leased})).sort((a,b)=>parseFloat(b.conversionRate)-parseFloat(a.conversionRate));
    };
    const brickellMetrics=analyzeProperty(data.brickell,'Brickell');

    const eastMetrics=analyzeProperty(data.east,'East');

    };

}

function weeklyPace(){
    const ws=gws(),n=getNow();

    const ewtd=cpm(data.east,'wtd');
    const fwtd=cpm(data.ftl,'wtd');
    const totalWtd=bwtd.leasesSignedCount+wwtd.leasesSignedCount+ewtd.leasesSignedCount+fwtd.leasesSignedCount;
    const ms=new Date(2026,1,1),dim=28,dr=Math.max(1,dim-Math.floor((n-ms)/86400000));

    const ftlRemaining=Math.max(0,GOALS.ftl-ftlMtd.leasesSignedCount);
    const brickellDailyNeed=(brickellRemaining/dr);
    const westDailyNeed=(westRemaining/dr);
    const eastDailyNeed=(eastRemaining/dr);
    const ftlDailyNeed=(ftlRemaining/dr);
    const weeklyTarget=(brickellDailyNeed+westDailyNeed+eastDailyNeed+ftlDailyNeed)*7;
    const dailyRate=daysIntoWeek>0?(totalWtd/daysIntoWeek):0;
    const projectedWeek=Math.round(totalWtd+(dailyRate*daysLeftInWeek));
    const onPace=projectedWeek>=weeklyTarget;
    const brickellWeeklyTarget=(brickellDailyNeed*7).toFixed(1);
    const westWeeklyTarget=(westDailyNeed*7).toFixed(1);
    const eastWeeklyTarget=(eastDailyNeed*7).toFixed(1);
    const ftlWeeklyTarget=(ftlDailyNeed*7).toFixed(1);

    const eastDailyRate=daysIntoWeek>0?(ewtd.leasesSignedCount/daysIntoWeek):0;
    const ftlDailyRate=daysIntoWeek>0?(fwtd.leasesSignedCount/daysIntoWeek):0;
    const brickellProjected=Math.round(bwtd.leasesSignedCount+(brickellDailyRate*daysLeftInWeek));
    const westProjected=Math.round(wwtd.leasesSignedCount+(westDailyRate*daysLeftInWeek));

between text-sm"><span class="text-gray-600">WTD:</span><span class="font-bold text-blue-600">${bwtd.leasesSignedCount}</span></div><div class="flex justify-between text-sm"><span class="text-gray-600">Need:</span><span class="font-semibold text-orange-600">${brickellWeeklyTarget}</span></div><div class="flex justify-between text-sm"><span class="text-gray-600">Pace:</span><span class="font-bold text-purple-600">${(brickellWeeklyNeed/daysLeftInWeek).toFixed(1)}/day</span></div></div></div><div class="p-4 bg-purple-50 rounded border-l-4 ${westOnPace?'border-green-500':'border-red-500'}"><div class="flex justify-between items-center mb-2"><span class="font-semibold text-purple-700">West</span><span class="text-2xl">${westOnPace?'✓':'✗'}</span></div><div class="space-y-1"><div class="flex justify-between text-sm"><span class="text-gray-600">WTD:</span><span class="font-bold text-purple-600">${wwtd.leasesSignedCount}</span></div><div class="flex justify-between text-sm"><span class="text-gray-600">Need:</span><span class="font-semibold text-orange-600">${westWeeklyTarget}</span></div><div class="flex justify-between text-sm"><span class="text-gray-600">Pace:</span><span class="font-bold text-purple-600">${(westWeeklyNeed/daysLeftInWeek).toFixed(1)}/day</span></div></div></div><div class="p-4 bg-green-50 rounded border-l-4 ${eastOnPace?'border-green-500':'border-red-500'}"><div class="flex justify-between items-center mb-2"><span class="font-semibold text-green-700">East</span><span class="text-2xl">${eastOnPace?'✓':'✗'}</span></div><div class="space-y-1"><div class="flex justify-between text-sm"><span class="text-gray-600">WTD:</span><span class="font-bold text-green-600">${ewtd.leasesSignedCount}</span></div><div class="flex justify-between text-sm"><span class="text-gray-600">Need:</span><span class="font-semibold text-orange-600">${eastWeeklyTarget}</span></div><div class="flex justify-between text-sm"><span class="text-gray-600">Pace:</span><span class="font-bold te
